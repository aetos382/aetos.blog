# ビルド・デプロイワークフロー
#
# トリガーと動作:
#   push (main)        → 本番ビルド＆デプロイ
#   pull_request       → preview ラベルを付けるとプレビューデプロイ
#   workflow_dispatch  → main ブランチ → 本番デプロイ、それ以外 → プレビューデプロイ
name: publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      target: ${{ steps.check.outputs.target }}
      pr-number: ${{ steps.check.outputs.pr-number }}
      branch-alias: ${{ steps.parse.outputs.branch-alias }}
    steps:
      - id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HAS_PREVIEW: ${{ contains(github.event.pull_request.labels.*.name, 'preview') }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request)
              BRANCH="$HEAD_REF"
              echo "has-preview-label=$PR_HAS_PREVIEW" >> "$GITHUB_OUTPUT"
              echo "pr-number=$PR_NUMBER"               >> "$GITHUB_OUTPUT"
              ;;
            *)
              BRANCH="$REF_NAME"
              echo "has-preview-label=false" >> "$GITHUB_OUTPUT"
              echo "pr-number="              >> "$GITHUB_OUTPUT"
              ;;
          esac
          ALIAS=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | tr '/_ ' '-' | tr -s '-' | sed 's/^-//;s/-$//')
          echo "branch-alias=$ALIAS" >> "$GITHUB_OUTPUT"

      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_PREVIEW_LABEL: ${{ steps.parse.outputs.has-preview-label }}
          PR_NUMBER: ${{ steps.parse.outputs.pr-number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            push)
              { echo "proceed=true"; echo "target=production"; echo "pr-number="; } >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              if [[ "$REF_NAME" == "main" ]]; then
                { echo "proceed=true"; echo "target=production"; echo "pr-number="; } >> "$GITHUB_OUTPUT"
              else
                { echo "proceed=true"; echo "target=preview"; echo "pr-number="; } >> "$GITHUB_OUTPUT"
              fi
              ;;
            pull_request)
              if [[ "$HAS_PREVIEW_LABEL" == "true" ]]; then
                { echo "proceed=true"; echo "target=preview"; echo "pr-number=$PR_NUMBER"; } >> "$GITHUB_OUTPUT"
              else
                { echo "proceed=false"; echo "target=none"; echo "pr-number="; } >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: '0.160.1'
      DART_SASS_VERSION: '1.99.0'
      BUNDLE_GEMFILE: ${{ github.workspace }}/src/Gemfile
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true
          ref: ${{ needs.gate.outputs.pr-number != '' && format('refs/pull/{0}/head', needs.gate.outputs.pr-number) || '' }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'src/go.mod'
          cache: false

      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: Create directories
        run: |
          set -euo pipefail
          mkdir -p ${GITHUB_WORKSPACE}/bin
          mkdir -p ${GITHUB_WORKSPACE}/binstubs
          echo "${GITHUB_WORKSPACE}/bin/" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/binstubs/" >> $GITHUB_PATH

      - name: Create binstubs
        run: |
          set -euo pipefail
          bundle config set bin ${GITHUB_WORKSPACE}/binstubs
          bundle binstubs asciidoctor

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-tools
        with:
          path: ${{ github.workspace }}/bin
          key: tools-hugo-${{ env.HUGO_VERSION }}-sass-${{ env.DART_SASS_VERSION }}

      - name: Install Hugo
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --retry 3 --retry-delay 5 -qfsSL https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz | tar -C ${GITHUB_WORKSPACE}/bin/ -xz hugo

      - name: Install Dart Sass
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --retry 3 --retry-delay 5 -qfsSL https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz | tar -C ${GITHUB_WORKSPACE}/bin/ -xz --strip-components=1

      - name: Verify installations
        working-directory: src
        run: |
          set -euo pipefail
          git version | echo "git: $(cat -)"
          git lfs version | echo "git lfs: $(cat -)"
          hugo version | echo "hugo: $(cat -)"
          sass --version | echo "dart-sass: $(cat -)"
          asciidoctor --version | echo "asciidoctor: $(cat -)"
          go version | echo "go: $(cat -)"
          node --version | echo "node: $(cat -)"
          npm --version | echo "npm: $(cat -)"
          npx wrangler --version | echo "wrangler: $(cat -)"

      - run: npm ci
        working-directory: src

      - name: Set build params
        id: build-params
        run: |
          if [[ "${{ needs.gate.outputs.target }}" == "preview" ]]; then
            echo "base-url=https://${{ needs.gate.outputs.branch-alias }}-aetos-blog.aetos.workers.dev" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "minify=false" >> $GITHUB_OUTPUT
          else
            echo "base-url=${{ vars.CLOUDFLARE_WORKER_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "minify=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        working-directory: src
        env:
          HUGO_PARAMS_GITALK_CLIENTSECRET: ${{ secrets.HUGO_PARAMS_GITALK_CLIENTSECRET }}
        run: >
          hugo build
          --baseURL ${{ steps.build-params.outputs.base-url }}
          --environment ${{ steps.build-params.outputs.environment }}
          --minify=${{ steps.build-params.outputs.minify }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-assets
          path: src/public
          if-no-files-found: error

  deploy-production:
    needs: [gate, build]
    if: needs.gate.outputs.target == 'production'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            src/wrangler.jsonc
            src/package.json
            src/package-lock.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - run: npm ci
        working-directory: src

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-assets
          path: src/public

      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          workingDirectory: src
          command: deploy --config wrangler.jsonc

  deploy-preview:
    needs: [gate, build]
    if: needs.gate.outputs.target == 'preview'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            src/wrangler.jsonc
            src/package.json
            src/package-lock.json
          ref: ${{ needs.gate.outputs.pr-number != '' && format('refs/pull/{0}/head', needs.gate.outputs.pr-number) || '' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - run: npm ci
        working-directory: src

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-assets
          path: src/public

      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          workingDirectory: src
          command: >
            versions upload
            --config wrangler.jsonc
            --preview-alias ${{ needs.gate.outputs.branch-alias }}

      - name: Post preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PREVIEW_URL: https://${{ needs.gate.outputs.branch-alias }}-aetos-blog.aetos.workers.dev
          PR_NUMBER: ${{ needs.gate.outputs.pr-number }}
        run: |
          set -euo pipefail
          echo ":rocket: ${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$PR_NUMBER" ]]; then
            MARKER_START='<!-- preview-url -->'
            MARKER_END='<!-- /preview-url -->'
            CONTENT=":rocket: ${PREVIEW_URL}"

            BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
            if ! echo "$BODY" | grep -q "$MARKER_START"; then
              BODY=$(printf '%s\n\n%s' "$BODY" "${MARKER_START}${MARKER_END}")
            fi
            BODY=${BODY/"${MARKER_START}${MARKER_END}"/"${MARKER_START}${CONTENT}${MARKER_END}"}
            gh pr edit "$PR_NUMBER" --body "${BODY}"
          fi
